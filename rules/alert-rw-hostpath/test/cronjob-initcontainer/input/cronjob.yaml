apiVersion: batch/v1
kind: CronJob
metadata:
  name: hello
spec:
  schedule: "*/1 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          initContainers:
          - name: init-container
            image: k8s.gcr.io/test-webserver
            volumeMounts:
            - mountPath: /test-pd
              readOnly: false
              name: test-volume
          containers:
          - name: test-container
            image: k8s.gcr.io/test-webserver
          volumes:
          - name: test-volume
            hostPath:
              path: /var
          restartPolicy: OnFailure
