apiVersion: v1
kind: Pod
metadata:
  name: initcontainer-secretkeyref-pod
  labels:
    app: initcontainer-secretkeyref-pod
spec:
  initContainers:
  - name: init-secret
    image: busybox:1.36.1
    env:
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: db-credentials
          key: password
    command: ["sh", "-c", "echo initializing"]
  containers:
  - name: main-container
    image: nginx:1.25
