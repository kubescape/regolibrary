apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-deployment
spec:
  selector:
    matchLabels:
      app: test
  template:
    metadata:
      labels:
        app: test
    spec:
      initContainers:
        - name: init-container
          image: busybox
          securityContext:
            readOnlyRootFilesystem: false
      containers:
        - name: app
          image: nginx
          securityContext:
            readOnlyRootFilesystem: true
