apiVersion: batch/v1
kind: CronJob
metadata:
  name: test-cronjob
spec:
  schedule: "* * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          initContainers:
            - name: init-container
              image: busybox
              securityContext:
                readOnlyRootFilesystem: false
          containers:
            - name: app
              image: nginx
              securityContext:
                readOnlyRootFilesystem: true
          restartPolicy: OnFailure
