apiVersion: v1
kind: Pod
metadata:
  name: priv-initcontainer-pod
  labels:
    app: priv-initcontainer-pod
spec:
  initContainers:
  - name: setup
    image: busybox
    securityContext:
      privileged: true
  containers:
  - name: app
    image: nginx
    securityContext:
      privileged: false
