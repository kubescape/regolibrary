apiVersion: v1
kind: Pod
metadata:
  name: priv-ephemeral-pod
  labels:
    app: priv-ephemeral-pod
spec:
  containers:
  - name: app
    image: nginx
    securityContext:
      privileged: false
  ephemeralContainers:
  - name: debugger
    image: busybox
    securityContext:
      capabilities:
        add: ["SYS_ADMIN"]
