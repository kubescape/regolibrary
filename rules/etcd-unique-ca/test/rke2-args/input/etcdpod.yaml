apiVersion: v1
kind: Pod
metadata:
  labels:
    component: etcd
    tier: control-plane
  name: etcd
  namespace: kube-system
spec:
  containers:
    - command:
        - etcd
      args:
        - '--advertise-client-urls=https://192.168.49.2:2379'
        - '--data-dir=/var/lib/rancher/rke2/server/db/etcd'
        - '--name=rke2-server'
        - '--trusted-ca-file=/var/lib/rancher/rke2/server/tls/etcd/server-ca.crt'
      image: index.docker.io/rancher/hardened-etcd:v3.5.21-k3s1
      name: etcd
  hostNetwork: true
  nodeName: rke2-server
