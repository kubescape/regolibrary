apiVersion: apps/v1
kind: Deployment
metadata:
  name: zero-rolling-update
  labels:
    app: zero-rolling-update
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 0
  selector:
    matchLabels:
      app: zero-rolling-update
  template:
    metadata:
      labels:
        app: zero-rolling-update
    spec:
      containers:
        - name: app
          image: nginx:1.25
