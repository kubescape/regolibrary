apiVersion: v1
kind: Pod
metadata:
  labels:
    component: kube-apiserver
    tier: control-plane
  name: kube-apiserver-rke2-server
  namespace: kube-system
spec:
  containers:
    - command:
        - kube-apiserver
      args:
        - '--advertise-address=10.0.4.1'
        - '--secure-port=6443'
        - '--service-account-key-file=/var/lib/rancher/rke2/server/tls/service.key'
      image: index.docker.io/rancher/hardened-kubernetes:v1.32.11-rke2r1
      name: kube-apiserver
  hostNetwork: true
  nodeName: rke2-server
