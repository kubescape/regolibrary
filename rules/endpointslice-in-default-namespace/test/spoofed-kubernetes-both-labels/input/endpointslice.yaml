apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: kubernetes-spoof-both-labels
  namespace: default
  labels:
    endpointslice.kubernetes.io/managed-by: endpointslice-controller.k8s.io
    kubernetes.io/service-name: kubernetes
addressType: IPv4
ports:
  - name: https
    protocol: TCP
    port: 6443
endpoints:
  - addresses: ["10.0.0.4"]
    conditions:
      ready: true
