apiVersion: apps/v1
kind: Deployment
metadata:
  name: mismatched-sa-deployment
spec:
  selector:
    matchLabels:
      app: mismatched-sa
  template:
    metadata:
      labels:
        app: mismatched-sa
    spec:
      serviceAccount: old-sa
      serviceAccountName: new-sa
      containers:
        - name: nginx
          image: nginx
