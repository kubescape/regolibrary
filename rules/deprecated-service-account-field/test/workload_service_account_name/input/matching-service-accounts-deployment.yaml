apiVersion: apps/v1
kind: Deployment
metadata:
  name: matching-service-accounts-deployment
spec:
  selector:
    matchLabels:
      app: matching-sa
  template:
    metadata:
      labels:
        app: matching-sa
    spec:
      serviceAccount: app-sa
      serviceAccountName: app-sa
      containers:
        - name: nginx
          image: nginx
