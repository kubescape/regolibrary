apiVersion: v1
kind: Pod
metadata:
  name: test-pd
spec:
  initContainers:
  - image: k8s.gcr.io/test-webserver
    name: init-container
    volumeMounts:
    - mountPath: /test-pd
      name: test-volume
  containers:
  - image: k8s.gcr.io/test-webserver
    name: test-container
  volumes:
  - name: test-volume
    hostPath:
      path: /var
