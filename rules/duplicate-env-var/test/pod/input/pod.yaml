apiVersion: v1
kind: Pod
metadata:
  name: duplicate-env-pod
spec:
  containers:
  - name: app
    image: nginx
    env:
    - name: LOG_LEVEL
      value: info
    - name: LOG_LEVEL
      value: debug
  - name: sidecar
    image: busybox
    env:
    - name: LOG_LEVEL
      value: info
    - name: CACHE_SIZE
      value: "128"
