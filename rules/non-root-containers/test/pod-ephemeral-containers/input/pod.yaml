apiVersion: v1
kind: Pod
metadata:
  name: test-pod
spec:
  ephemeralContainers:
    - name: debug-container
      image: busybox
      securityContext:
        runAsNonRoot: false
        runAsGroup: 2000
  containers:
    - name: app
      image: nginx
      securityContext:
        runAsNonRoot: true
        runAsGroup: 1000
