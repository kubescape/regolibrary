apiVersion: apps/v1
kind: Deployment
metadata:
  name: initcontainer-secret-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: initcontainer-secret-deploy
  template:
    metadata:
      labels:
        app: initcontainer-secret-deploy
    spec:
      initContainers:
      - name: init-secret
        image: busybox:latest
        envFrom:
        - secretRef:
            name: db-credentials
        command: ["sh", "-c", "echo initializing"]
      containers:
      - name: main-container
        image: nginx:1.25
