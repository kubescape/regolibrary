apiVersion: batch/v1
kind: CronJob
metadata:
  name: win-cronjob
spec:
  schedule: "*/1 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: win-container
            image: mcr.microsoft.com/windows/servercore:ltsc2022
            securityContext:
              windowsOptions:
                hostProcess: true
          restartPolicy: OnFailure
