apiVersion: batch/v1
kind: Job
metadata:
  name: win-job
spec:
  template:
    spec:
      initContainers:
      - name: win-init
        image: mcr.microsoft.com/windows/servercore:ltsc2022
        securityContext:
          windowsOptions:
            hostProcess: true
      containers:
      - name: app
        image: busybox
      restartPolicy: Never
