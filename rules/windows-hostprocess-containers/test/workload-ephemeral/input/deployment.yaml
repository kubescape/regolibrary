apiVersion: apps/v1
kind: Deployment
metadata:
  name: win-ephemeral-deployment
spec:
  selector:
    matchLabels:
      app: win-ephemeral-app
  template:
    metadata:
      labels:
        app: win-ephemeral-app
    spec:
      containers:
      - name: app
        image: busybox
      ephemeralContainers:
      - name: debug
        image: mcr.microsoft.com/windows/servercore:ltsc2022
        securityContext:
          windowsOptions:
            hostProcess: true
